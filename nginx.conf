# /etc/nginx/conf.d/default.conf

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name provision.internal localhost;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name provision.internal localhost;

    # SSL certificates
    ssl_certificate     /etc/nginx/certs/provision.crt;
    ssl_certificate_key /etc/nginx/certs/provision.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Проксируем запросы к FastAPI backend
    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты для провижининга
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Буферы
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health check endpoint (опционально, если нужно отдельно)
    location = /health {
        access_log off;
        proxy_pass http://api:8000/health;
    }
}